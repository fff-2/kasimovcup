<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="카시모프컵 2026 스모봇 배선도">
  <style>
    .cx-ttl  { font: 700 15px 'Malgun Gothic','Apple SD Gothic Neo',sans-serif; fill: #211E1B; text-anchor: middle; }
    .cx-ttls { font: 700 13px 'Malgun Gothic','Apple SD Gothic Neo',sans-serif; fill: #211E1B; text-anchor: middle; }
    .cx-pin  { font: 600 12px Consolas,'Cascadia Mono',monospace; fill: #454039; text-anchor: middle; }
    .cx-sub  { font: 600 11px 'Malgun Gothic',sans-serif; fill: #6E6760; text-anchor: middle; }
    .cx-tag  { font: 600 10.5px Consolas,monospace; fill: #6E6760; }
    .cx-box  { fill: #FFFFFF; stroke: #55504B; stroke-width: 1.6; }
    .cx-wire { fill: none; stroke-width: 2.4; }
    .cx-son  { stroke: #C96A1E; }
    .cx-i2c  { stroke: #6B4FA0; }
    .cx-mot  { stroke: #2F6DB5; }
    .cx-nn   { stroke: #2E7D4F; }
    .cx-pwr  { stroke: #B3261E; }
    .cx-wl   { font: 600 11px 'Malgun Gothic',sans-serif; fill: #55504B; text-anchor: middle;
               paint-order: stroke; stroke: #FCFBF9; stroke-width: 4px; stroke-linejoin: round; }
    .cx-leg  { font: 600 11.5px 'Malgun Gothic',sans-serif; fill: #454039; }
  </style>
  <defs>
    <marker id="cxg" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E7D4F"/>
    </marker>
    <marker id="cxr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#B3261E"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="1000" height="720" fill="#FCFBF9" stroke="#E3DED5"/>

  <!-- 제목 -->
  <text x="40" y="36" style="font:800 17px 'Malgun Gothic',sans-serif; fill:#211E1B">카시모프컵 2026 스모봇 배선도</text>
  <text x="40" y="57" style="font:600 11.5px 'Malgun Gothic',sans-serif; fill:#6E6760">신호선 중심 — 모든 모듈 VCC는 5V 레일, GND는 전체 공통(그림 생략) · 위쪽 = 로봇 전방</text>

  <!-- 범례 -->
  <g>
    <line class="cx-wire cx-son" x1="640" y1="26" x2="670" y2="26"/><text class="cx-leg" x="676" y="30">초음파</text>
    <line class="cx-wire cx-i2c" x1="750" y1="26" x2="780" y2="26"/><text class="cx-leg" x="786" y="30">I2C 컬러센서</text>
    <line class="cx-wire cx-pwr" x1="890" y1="26" x2="920" y2="26"/><text class="cx-leg" x="926" y="30">전원</text>
    <line class="cx-wire cx-mot" x1="640" y1="48" x2="670" y2="48"/><text class="cx-leg" x="676" y="52">모터 구동</text>
    <line class="cx-wire cx-nn"  x1="750" y1="48" x2="780" y2="48"/><text class="cx-leg" x="786" y="52">나노 간 신호</text>
  </g>

  <!-- ===== 초음파 4개 ===== -->
  <rect class="cx-box" x="400" y="80" width="180" height="58" rx="8"/>
  <text class="cx-ttls" x="490" y="104">HC-SR04 · 앞</text>
  <text class="cx-pin" x="490" y="124">Trig D4 · Echo D5</text>

  <rect class="cx-box" x="40" y="96" width="200" height="58" rx="8"/>
  <text class="cx-ttls" x="140" y="120">HC-SR04 · 왼쪽</text>
  <text class="cx-pin" x="140" y="140">Trig D6 · Echo D7</text>

  <rect class="cx-box" x="760" y="96" width="200" height="58" rx="8"/>
  <text class="cx-ttls" x="860" y="120">HC-SR04 · 오른쪽</text>
  <text class="cx-pin" x="860" y="140">Trig D2 · Echo D3</text>

  <rect class="cx-box" x="400" y="480" width="180" height="58" rx="8"/>
  <text class="cx-ttls" x="490" y="504">HC-SR04 · 뒤</text>
  <text class="cx-pin" x="490" y="524">Trig D8 · Echo D9</text>

  <!-- ===== 메인 나노 ===== -->
  <rect class="cx-box" x="400" y="210" width="180" height="230" rx="10" stroke-width="2.4"/>
  <text class="cx-ttl" x="490" y="318">메인 나노</text>
  <text class="cx-sub" x="490" y="338">모든 연산 담당</text>
  <!-- 접속점 핀 태그 -->
  <text class="cx-tag" x="440" y="226" text-anchor="middle">D6·D7</text>
  <text class="cx-tag" x="490" y="226" text-anchor="middle">D4·D5</text>
  <text class="cx-tag" x="540" y="226" text-anchor="middle">D2·D3</text>
  <text class="cx-tag" x="490" y="434" text-anchor="middle">D8·D9</text>
  <text class="cx-tag" x="408" y="324">A4·A5</text>
  <text class="cx-tag" x="408" y="396">D12</text>
  <text class="cx-tag" x="572" y="272" text-anchor="end">D10·A0·A1</text>
  <text class="cx-tag" x="572" y="322" text-anchor="end">D11·A2·A3</text>

  <!-- 초음파 배선 -->
  <line class="cx-wire cx-son" x1="490" y1="138" x2="490" y2="210"/>
  <polyline class="cx-wire cx-son" points="140,154 140,182 440,182 440,210"/>
  <polyline class="cx-wire cx-son" points="860,154 860,182 540,182 540,210"/>
  <line class="cx-wire cx-son" x1="490" y1="440" x2="490" y2="480"/>

  <!-- ===== 앞 컬러센서 ===== -->
  <rect class="cx-box" x="40" y="300" width="200" height="64" rx="8"/>
  <text class="cx-ttls" x="140" y="324">TCS34725 · 앞 라인</text>
  <text class="cx-pin" x="140" y="346">SDA A4 · SCL A5 (LED 켬)</text>
  <line class="cx-wire cx-i2c" x1="240" y1="332" x2="400" y2="332"/>

  <!-- ===== 컬러 나노 + 뒤 컬러센서 ===== -->
  <rect class="cx-box" x="40" y="470" width="200" height="90" rx="10" stroke-width="2.4"/>
  <text class="cx-ttl" x="140" y="500">컬러 나노</text>
  <text class="cx-sub" x="140" y="520">뒤 라인 감지 전담</text>
  <text class="cx-pin" x="140" y="544">출력 D2 · I2C A4/A5</text>

  <polyline class="cx-wire cx-nn" points="240,505 330,505 330,400 396,400" marker-end="url(#cxg)"/>
  <text class="cx-wl" x="285" y="497">D2 → D12</text>
  <text class="cx-wl" x="352" y="452">HIGH = 뒤 라인</text>

  <rect class="cx-box" x="40" y="610" width="200" height="58" rx="8"/>
  <text class="cx-ttls" x="140" y="634">TCS34725 · 뒤 라인</text>
  <text class="cx-pin" x="140" y="654">SDA A4 · SCL A5 (LED 켬)</text>
  <line class="cx-wire cx-i2c" x1="140" y1="610" x2="140" y2="560"/>

  <!-- ===== L298N + 모터 ===== -->
  <rect class="cx-box" x="760" y="240" width="200" height="140" rx="10" stroke-width="2.4"/>
  <text class="cx-ttl" x="860" y="268">L298N</text>
  <text class="cx-pin" x="860" y="292">ENA D10 · IN1 A0 · IN2 A1</text>
  <text class="cx-pin" x="860" y="312">ENB D11 · IN3 A2 · IN4 A3</text>
  <text class="cx-sub" x="860" y="336">PWM은 D10/D11 (나노에서 남은</text>
  <text class="cx-sub" x="860" y="352">PWM핀이 이 둘뿐 — 변경 금지)</text>

  <line class="cx-wire cx-mot" x1="580" y1="280" x2="760" y2="280"/>
  <text class="cx-wl" x="670" y="272">왼쪽 모터 제어</text>
  <line class="cx-wire cx-mot" x1="580" y1="330" x2="760" y2="330"/>
  <text class="cx-wl" x="670" y="322">오른쪽 모터 제어</text>

  <rect class="cx-box" x="760" y="420" width="90" height="52" rx="8"/>
  <text class="cx-ttls" x="805" y="450">모터 L</text>
  <rect class="cx-box" x="870" y="420" width="90" height="52" rx="8"/>
  <text class="cx-ttls" x="915" y="450">모터 R</text>
  <line class="cx-wire cx-mot" x1="800" y1="380" x2="800" y2="420"/>
  <text class="cx-wl" x="826" y="404">OUT1·2</text>
  <line class="cx-wire cx-mot" x1="920" y1="380" x2="920" y2="420"/>
  <text class="cx-wl" x="946" y="404">OUT3·4</text>

  <!-- ===== 전원 ===== -->
  <rect x="620" y="520" width="350" height="170" rx="10" fill="none" stroke="#B3261E" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text class="cx-ttls" x="795" y="545" fill="#B3261E">전원</text>
  <rect class="cx-box" x="645" y="560" width="130" height="50" rx="8"/>
  <text class="cx-ttls" x="710" y="590">7.4V 배터리 (2S)</text>
  <rect class="cx-box" x="815" y="560" width="130" height="50" rx="8"/>
  <text class="cx-ttls" x="880" y="590">강압기 → 5V</text>
  <line class="cx-wire cx-pwr" x1="775" y1="585" x2="811" y2="585" marker-end="url(#cxr)"/>
  <text class="cx-sub" x="795" y="632">5V 병렬 공급 → 메인 나노 · 컬러 나노 · L298N</text>
  <text class="cx-sub" x="795" y="650">GND는 모든 모듈 공통 연결 (필수!)</text>
  <text class="cx-sub" x="795" y="668" fill="#B3261E">팁: L298N 모터전원(VS)을 7.4V 직결하면 밀기 토크 ↑</text>
</svg>
